 350); font-weight:600;\">pink sign out front is glowing<\u002Fspan>, you know you're in for a good time.<\u002Fp>\n\n    <!-- event marquee -->\n    <div style=\"position:relative; width:100%; max-width:980px; overflow:hidden; margin:46px 0 8px; -webkit-mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent); mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent);\">\n      <div style=\"display:flex; width:max-content; gap:14px; animation:kl-marquee 28s linear infinite;\">\n        <div style=\"display:flex; gap:14px;\">\n          <span class=\"kl-chip\" role=\"button\" tabindex=\"0\" aria-haspopup=\"dialog\" data-activity=\"board-games\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.66 0.20 350); cursor:pointer;\">🎲 Board game nights<\u002Fspan>\n          <span class=\"kl-chip\" role=\"button\" tabindex=\"0\" aria-haspopup=\"dialog\" data-activity=\"dinners\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.70 0.18 55); cursor:pointer;\">🍝 Dinners<\u002Fspan>\n          <span class=\"kl-chip\" role=\"button\" tabindex=\"0\" aria-haspopup=\"dialog\" data-activity=\"powerpoint\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#3a3340; background:oklch(0.86 0.16 95); cursor:pointer;\">📊 PowerPoint parties<\u002Fspan>\n          <span class=\"kl-chip\" role=\"button\" tabindex=\"0\" aria-haspopup=\"dialog\" data-activity=\"hot-wings\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.66 0.18 150); cursor:pointer;\">🔥 Hot wing parties<\u002Fspan>\n          <span class=\"kl-chip\" role=\"button\" tabindex=\"0\" aria-haspopup=\"dialog\" data-activity=\"dnd\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.62 0.16 240); cursor:pointer;\">🐉 D&amp;D nights<\u002Fspan>\n          <span class=\"kl-chip\" role=\"button\" tabindex=\"0\" aria-haspopup=\"dialog\" data-activity=\"whats-next\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.64 0.20 310); cursor:pointer;\">✨ &amp; whatever's next<\u002Fspan>\n        <\u002Fdiv>\n        <div aria-hidden=\"true\" style=\"display:flex; gap:14px;\">\n          <span data-activity=\"board-games\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.66 0.20 350); cursor:pointer;\">🎲 Board game nights<\u002Fspan>\n          <span data-activity=\"dinners\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.70 0.18 55); cursor:pointer;\">🍝 Dinners<\u002Fspan>\n          <span data-activity=\"powerpoint\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#3a3340; background:oklch(0.86 0.16 95); cursor:pointer;\">📊 PowerPoint parties<\u002Fspan>\n          <span data-activity=\"hot-wings\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.66 0.18 150); cursor:pointer;\">🔥 Hot wing parties<\u002Fspan>\n          <span data-activity=\"dnd\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.62 0.16 240); cursor:pointer;\">🐉 D&amp;D nights<\u002Fspan>\n          <span data-activity=\"whats-next\" style=\"white-space:nowrap; padding:13px 22px; border-radius:999px; font-weight:600; font-size:17px; color:#fff; background:oklch(0.64 0.20 310); cursor:pointer;\">✨ &amp; whatever's next<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <a class=\"kl-btn\" href=\"https://booking.kandyland.net.au\" target=\"_blank\" rel=\"noopener\" style=\"margin-top:48px; display:inline-flex; align-items:center; gap:12px; text-decoration:none; padding:22px 46px; border-radius:999px; font-family:'Lilita One',sans-serif; font-size:25px; letter-spacing:.01em; color:#fff; background:oklch(0.66 0.20 350); box-shadow:0 14px 0 -2px oklch(0.52 0.18 350), 0 22px 34px -14px oklch(0.52 0.18 350);\" style-hover=\"transform:translateY(-3px); box-shadow:0 17px 0 -2px oklch(0.52 0.18 350), 0 30px 40px -14px oklch(0.52 0.18 350)\">Book your stay <span style=\"font-size:27px;\">→<\u002Fspan><\u002Fa>\n\n    <div style=\"margin-top:30px; font-size:14px; letter-spacing:.06em; color:#9a8f86;\">the sign's on. come round. 🔑<\u002Fdiv>\n  <\u002Fmain>\n  <!-- activity detail modal -->\n  <div id=\"kl-modal-overlay\" style=\"position:fixed; inset:0; z-index:9999; display:none; align-items:center; justify-content:center; padding:24px; background:rgba(58,51,64,0.55); backdrop-filter:blur(2px);\">\n    <div id=\"kl-modal-card\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"kl-modal-title\" style=\"position:relative; width:100%; max-width:440px; background:#FFF7EE; border-radius:28px; padding:44px 32px 32px; box-shadow:0 30px 60px -20px rgba(0,0,0,0.35); text-align:center;\">\n      <button id=\"kl-modal-close\" aria-label=\"Close\" style=\"position:absolute; top:14px; right:14px; width:36px; height:36px; border:none; border-radius:50%; background:#f0e6da; color:#3a3340; font-size:18px; line-height:1; cursor:pointer;\">&times;<\u002Fbutton>\n      <div id=\"kl-modal-emoji\" style=\"font-size:48px; margin-bottom:8px;\"><\u002Fdiv>\n      <div id=\"kl-modal-title\" style=\"font-family:'Lilita One',sans-serif; font-size:26px; margin-bottom:14px;\"><\u002Fdiv>\n      <p id=\"kl-modal-desc\" style=\"font-size:17px; line-height:1.55; color:#3a3340; margin:0;\"><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script data-dc-script type=\"text/plain\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    var activities = {\n        'board-games': { emoji:'🎲', title:\"Board Game Nights\", color:'oklch(0.66 0.20 350)', desc:\"Grab a seat at the table \\u2014 we've got a shelf full of classics and a few weird ones we picked up just to see what happens. BYO snacks optional, banter mandatory.\" },\n        'dinners': { emoji:'🍝', title:\"Dinners\", color:'oklch(0.70 0.18 55)', desc:\"Whoever's home cooks, whoever's hungry shows up. Expect big pots, more garlic than necessary, and seconds.\" },\n        'powerpoint': { emoji:'📊', title:\"PowerPoint Parties\", color:'oklch(0.55 0.10 95)', desc:\"Everyone builds a slide deck on a topic nobody asked about, then defends it like a thesis. Citations optional, confidence mandatory.\" },\n        'hot-wings': { emoji:'🔥', title:\"Hot Wing Parties\", color:'oklch(0.66 0.18 150)', desc:\"Wings, escalating heat levels, and the collective delusion that 'one more' won't hurt. Milk provided.\" },\n        'dnd': { emoji:'🐉', title:\"D&D Nights\", color:'oklch(0.62 0.16 240)', desc:\"Dice, dungeons, and at least one character who forgot to read the rulebook. New players always welcome \\u2014 we'll build you a sheet.\" },\n        'whats-next': { emoji:'✨', title:\"& Whatever's Next\", color:'oklch(0.64 0.20 310)', desc:\"The sign stays glowing for a reason. If someone has a good idea and a free evening, it becomes a thing. Check back \\u2014 or better, come round and start one.\" }\n    };\n    var overlay = document.getElementById('kl-modal-overlay');\n    var emojiEl = document.getElementById('kl-modal-emoji');\n    var titleEl = document.getElementById('kl-modal-title');\n    var descEl = document.getElementById('kl-modal-desc');\n    var closeBtn = document.getElementById('kl-modal-close');\n    var lastFocused = null;\n\n    function openModal(id) {\n      var a = activities[id];\n      if (!a || !overlay) return;\n      lastFocused = document.activeElement;\n      emojiEl.textContent = a.emoji;\n      titleEl.textContent = a.title;\n      titleEl.style.color = a.color;\n      descEl.textContent = a.desc;\n      overlay.style.display = 'flex';\n      document.body.style.overflow = 'hidden';\n      if (closeBtn) closeBtn.focus();\n    }\n    function closeModal() {\n      if (!overlay) return;\n      overlay.style.display = 'none';\n      document.body.style.overflow = '';\n      if (lastFocused && lastFocused.focus) lastFocused.focus();\n    }\n\n    document.querySelectorAll('[data-activity]').forEach(function (el) {\n      el.addEventListener('click', function () {\n        openModal(el.getAttribute('data-activity'));\n      });\n      el.addEventListener('keydown', function (e) {\n        if (e.key === 'Enter' || e.key === ' ') {\n          e.preventDefault();\n          openModal(el.getAttribute('data-activity'));\n        }\n      });\n    });\n    if (overlay) {\n      overlay.addEventListener('click', function (e) {\n        if (e.target === overlay) closeModal();\n      });\n    }\n    if (closeBtn) closeBtn.addEventListener('click', closeModal);\n    document.addEventListener('keydown', function (e) {\n      if (e.key === 'Escape') closeModal();\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
